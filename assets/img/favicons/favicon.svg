<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2a2d35"/>
      <stop offset="100%" stop-color="#1a1d24"/>
    </linearGradient>
  </defs>
  <!-- Rounded square background -->
  <rect width="512" height="512" rx="96" ry="96" fill="url(#bg)"/>
  <!-- V letter - white, slightly left -->
  <text x="160" y="380" font-family="Segoe UI, Arial, sans-serif" font-weight="700" font-size="340" fill="#ffffff" letter-spacing="-10">V</text>
  <!-- L letter - lighter, overlapping right -->
  <text x="268" y="380" font-family="Segoe UI, Arial, sans-serif" font-weight="700" font-size="340" fill="rgba(255,255,255,0.45)" letter-spacing="-10">L</text>
</svg>
